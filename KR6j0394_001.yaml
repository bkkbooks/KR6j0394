body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯爾時世尊在覩史多天與無數百千俱胝那由他菩薩共會一處時有無數百千俱胝那由他天所謂娑多擬哩呬摩嚩多難儞枳濕嚩囉摩訶迦攞摩醯濕嚩囉吠惹演多那羅延等復有無數天龍阿蘇囉誐嚕拏巘達哩嚩緊那囉摩護囉誐藥叉囉叉娑及諸星曜如是等衆皆悉來集在於佛會爾時金剛手菩薩摩訶薩白佛言世尊今有一切羅剎行於世間作大怖畏惟願世尊愍於世間為除怖畏説金剛香菩薩大明使彼羅剎及一切天龍八部乃至一切星曜行不饒益者見彼大明皆悉迷悶怖畏馳散於諸衆生不能為害世尊豈唯如是等衆見已怖畏乃至帝釋亦失威力彼一切魔障現大忿怒諸惡相者悉皆破壞於諸有情不能侵害爾時金剛手菩薩摩訶薩重白佛言世尊今正是時何以故一切魔等見在此會唯願世尊宣説金剛香菩薩大明是時世尊即入三摩地名普遍熾盛光大忿怒入此三摩地已即於眼中放大光明作種種色其光普照一切世界照已旋還於佛前住如大火聚即於光中化出大忿怒身光焰熾盛住於佛前現大惡相見者怖畏所有一切天龍藥叉囉叉娑巘達哩嚩阿蘇囉誐嚕拏緊那囉摩護囉誐等及一切部多所有威力悉皆破壞復次金剛手菩薩白佛言世尊如我所請願為宣説亦令當來持誦行人一切所作皆得成就一切部多皆悉降伏凡有所求皆來給與乃至地中伏藏悉皆獲得世尊此大明威德之力降伏加臨一切人非人等令其入寤使作歌舞及為給使無不隨意乃至破彼身分以充食噉亦不敢違世尊此大明力乃至加臨山石無情之類亦可震動現入寤相何況一切天龍八部人非人等如是等衆若違逆者皆令頭破爾時化忿怒像於剎那頃現身光明如日照曜於金剛手菩薩前立即説金剛香大明曰曩麼室戰二合拏一嚩日囉二合播引拏曳引二摩賀引藥乞叉二合枲曩引鉢多曳引三唵引曩謨引婆誐嚩帝引四阿引哩也二合五嚩日囉二合巘引馱引哩引六阿儞引迦囉濕彌二合七設多娑賀娑囉二合八鉢囉二合入嚩二合禮多九捻鉢多二合帝引惹引曳十沃仡囉二合鼻摩十一婆野引曩迦引曳引十二嘮引捺囉二合那哩舍二合曩引曳引十三尾迦囉引攞引曳引十四贊拏引曳引十五拶波攞引曳十六喻引藝引濕嚩二合哩引曳引十七鼻引瑟麼二合婆野引曩迦引曳引十八沙吒目二合佉引曳引十九訥嚩二合引那舍普惹引曳引二十訥嚩二合引那舍儞引怛囉二合引曳引二十一尾枳引囉拏二合計引舍引曳引二十二阿儞引迦嚕引波二十三尾尾馱吠引舍馱引哩抳引曳引二十四噎呬曳二合引呬婆誐嚩底二十五麼賀引嚩日囉二合巘引馱引哩引怛囉二合野引喃引二十六囉怛曩二合引南引薩帝曳二合引曩二十七怛儞也二合他引二十八唵引二十九阿引迦茶野阿引迦茶野三十嚩攞禰引嚩麼呬引濕嚩二合囕三十一誐嚕拏江二合三十二尾瑟女唵三合三十三俱麼引囕三十四沒囉二合憾麼二合喃引三十五印捺囕二合三十六贊捺囕二合阿引禰底樣二合三十七藥懺𠸪乞叉二合僧三十八普引璫三十九畢哩二合引璫四十閉舍引𮍏四十一矩伴引喃四十二阿仡寧二合四十三嚩引踴四十四野莽四十五嚩嚕喃四十六馱曩能四十七矩吠囕四十八鉢囉二合惹引鉢底四十九地哩二合多囉引瑟吒囕三合五十尾嚕茶劍五十一尾嚕播引乞創二合五十二吠引武每切室囉二合麼喃五十三商矩迦囉喃二合五十四訥尾二合迦囉喃二合五十五怛哩二合迦囉喃二合五十六尾迦囉喃二合五十七沒哩二合賀迦囉喃二合五十八健吒引迦囉喃二合五十九訥嚕二合拏迦囉喃二合六十虞迦囉喃二合六十一摩賀引迦囉喃二合六十二麼賀引迦引朗六十三難儞計引濕嚩二合囕六十四勃陵二合擬哩引知盈二合六十五曩引野劍六十六尾曩引野劍六十七半唧劍六十八那麼劍六十九路賀劍七十謨引賀劍七十一沙瑟恥二合禰引吠孕二合引七十二唵引七十三迦引陵七十四矩引知盈二合七十五擬哩引劍引七十六訥哩誐二合七十七憍麼引哩引七十八迦底也二合引以寧引七十九贊拏迦引底也二合引以寧引八十麼賀引迦引底也二合引以寧二合八十一野舍濕彌二合寧引八十二愛舍引寧八十三乃哩底樣二合引八十四迦引禮引八十五麼賀引迦引禮引八十六乞芻二合捺囉二合迦引禮引八十七嚩日囉二合迦引禮引八十八跋捺囉二合迦禮引八十九祖攞迦引禮引九十阿擬儞二合引樣引九十一嚩引野尾焰二合引九十二舍引禮引舍引禮引迦嚩引哩底二合引九十三囉引怛哩二合九十四扇底盈二合九十五爍訖鼎二合九十六設多引乞曬二合引九十七麼賀引設多引乞曬二合引印捺囉二合引抳九十八沒囉二合憾摩二合引抳九十九嬌引麼引哩引一百麼引呬引濕嚩二合哩引一百一吠引瑟拏二合下尼所切尾引一百二酥婆誐引一百三左捫抳引一百四嘮引捺哩二合一百五嚩引囉引呬引一百六嬌吠引哩引一百七曳引左引儞曳二合引麼麼一百八三麼曳引曩底瑟姹演三合底一百九擔引薩哩網二合引阿引嚩引賀一百一十以沙也二合引彌一百一十一尸伽囕二合伽哩二合恨拏二合伽哩引恨拏二合一百一十二仡哩二合恨拏二合跛野仡哩二合恨拏二合跛野一百一十三攞攞攞攞攞一百一十四唵引一百一十五虞魯虞魯一百一十六虎魯虎魯一百一十七祖魯祖魯一百一十八母魯母魯一百一十九度努度努一百二十嚩麼嚩麼一百二十一達麼達麼一百二十二馱囉馱囉一百二十三摩囉摩囉一百二十四馱迦馱迦一百二十五攞虎攞虎一百二十六囕誐囕誐一百二十七囕誐跛野一百二十八惹臘波二合惹臘波一百二十九惹臘播二合引跛野惹臘播二合引跛野一百三十布引囉布囉一百三十一布引囉野布囉野一百三十二布引囉引跛野布引囉引跛野一百三十三攞虎攞虎一百三十四阿引曩野阿引曩野一百三十五阿引尾舍阿尾舍一百三十六阿引吠引舍野阿引吠舍野一百三十七唵引一百三十八曩謨引婆誐嚩帝引一百三十九麼賀引嚩日囉二合巘引馱引哩引一百四十阿儞引迦囉濕彌二合一百四十一設多娑賀薩囉二合鉢囉二合入嚩二合禮多一百四十二捻鉢多二合帝引惹洗引一百四十三悉馱室贊二合拏嚩日囉二合播引抳一百四十四囉引倪也二合引跛野底一百四十五唵引一百四十六紇哩二合一百四十七呬一百四十八郝郝郝郝郝一百四十九斛引一百五十紇哩二合一百五十一吽一百五十二發吒半音一百五十三囕囕囕囕一百五十四娑嚩二合引賀引一百五十五爾時化忿怒像説此大明已復説金剛香菩薩大明諸成就法若以此明加持安息香燒之能令一切入寤所有天人藥叉乃至魑魅等所執悉能除解復次行者於大自在天像前誦此明復以忿怒相觀天像又以五淨水沐浴天像又用白檀香作塗香塗天像身以諸香花而作供養然以二手按像誦大明從初夜至明旦誦聲作輟其大自在天決定化身作外道形相來誦者前默然而立誦者見已即禮拜告言聖者善來其化像報言善來善來誦者即以所願求之天即與願一切皆得天像與行者願已隱沒不現行者得悉地已此後一切所作悉得遂意或作息災增益敬愛降伏及句召者決定成就若作息災當用不墮地瞿摩夷塗四方曼拏羅成已用銀鉢一口先磨白檀作塗香塗鉢內外令遍即盛淨水令滿安曼拏羅中誦大明一百八遍加持彼鉢鉢即入寤或起離壇或動或顫知法成就即以此水灌於人頂或令人飲一切災難皆得息滅若以此水灑於城邑聚落其中人民災難皆息一切有情皆獲利益復次若為國王及大軍衆作息災者當用酪白麻子白粳米牛乳等相和作護摩一誦大明一稱王名一作護摩至千遍王及軍衆災難皆息又法或畫金剛香菩薩身白色作為衆生降甘露雨相於此像前日三時誦大明復觀想此像得現前已後念斛字一切災難無不息滅或有冤家來相𣣋逼者當用牛乳作護摩誦大明千遍冤自退散災難息滅或用安息香白麻子并酥同作護摩息一切災又法或作增益者當畫大羅剎女身作黃色有十六臂手中各有執捉一切殊妙嚴飾其身畫像成已用諸香花而作供養於此像前誦大明不輟至羅剎女自現可使句召一切夜叉羅剎并諸眷屬能滿行者一切所求財穀亦能出於地中伏藏隨意使用復次畫夜叉像身作白色復以白色香作塗香塗彼像身以白花供養於此像前口誦大明手持白花一誦一擲打彼像身日三時滿七日誦明數滿八千遍彼夜叉出現為誦人僕從一切役使不敢違逆或時自送一切財寶或出地中伏藏當令誦人獲大富盛復次作敬愛法畫金剛香菩薩像身作赤色有十二臂各有執捉以上妙天衣裝嚴其身畫像成已行人於像前作觀想觀畫像身放大赤光剎那之頃遍照三界其中一切天人羅剎乃至一切人非人等皆悉敬愛作觀成已方可求事行人欲求敬愛者先誦大明滿一千遍然用赤檀木作彼形像安於金剛香菩薩像前行人取迦囉尾囉花於菩薩像前一誦大明一稱彼名一擲彼像誦滿七遍決定獲得彼之敬愛又法用吉祥木造男女像或作童男童女像稱彼名用白芥子擲彼像至七晝夜必得敬愛又法用白芥子白檀香相和誦大明八十萬遍令一切人頂戴得一切敬愛又法若欲令冤家失心狂亂者用人骨作金剛橛長八指以安息香及牛肉同燒薰橛埋冤家門前彼即三日內失心離家狂走或用牛肉狗肉牛尿相和為埿作冤家像理尸陀林中彼即并諸眷屬出離千由旬外又法欲令冤家出本國者亦用人骨作金剛橛以人血染線纏橛打摩醯濕嚩囉頭上行人用左足踏摩呬濕嚩囉天用十四日或用八日行人誦大明不輟直至彼天出大苦聲其冤家失心狂亂并諸眷屬出於曠野由如獸群又法欲極破冤家者當畫金剛香菩薩身黑色百臂作忿怒相手執旗幡金剛杵金剛鎚羂索三叉劍弓箭鉞斧大斧骨桗金剛鉤枯尸人頭髑髏等種種器仗及百千妙好嚴飾其身放大光明踰於日月作破一切冤家相彼一切藥叉囉剎娑及一切大惡鬼神皆悉破壞驚怖馳散若欲破壞冤家至死者行者先誦大明八千遍然後以人骨作金剛橛長二指作忿怒心晝夜不輟誦大明八千遍加持橛已用牛肉為埿作冤家形像長八指用前橛釘其頂或口脅耳臍或陰及膝足等處經一七日彼冤家身決定破壞如阿梨樹枝乃至一切大惡悉能破壞又法欲破壞冤家至極者用牛尿并鹽醋同煎成埿與淨土瞿摩夷或吉祥草相和作冤家像復用白芥子遍塗彼像以火炙至冤家得病決定至死又法用佉儞囉木作橛長八指加持八百遍稱冤家名釘彼形像於剎那頃彼自禁縛或用尸灰作冤家像以人骨作金剛橛釘彼身分當得熱病乃至殞歿又法用鐵作橛長二指加持百遍埋於冤家門外三日內定離本家或將前橛埋於大自在天廟中埋時稱冤家名彼即得大自在天魅或稱名埋於空舍中彼即得畢舍左魅或取黑蛇口中沫塗坯器內令冤家食之須臾即死又法或用鐵作骨桗長六指先稱冤家名誦大明七遍加持安息香用燒熏骨桗埋冤家舍中彼即得大苦惱若出去骨桗苦惱即解又法用𩕳摩木作橛長十二指打頭臂脅三處及稱名又用牛毛為香稱名燒之彼得母鬼所魅又法用阿栗迦木作冤家形像於腹中書本名以人骨作釘釘於頭臂脅三處彼即苦惱若去釘如故又法用瞿摩夷作冤家形像用白芥子遍塗像身口誦大明直至像乾埋於尸陀林中於上誦大明八百遍加持白芥子散擲於上行者所求皆得成就又法同前造像取人牛狗三肉并白芥子塗像安冤家本舍中彼即迷倒永不入舍復次行人若欲求現女鬼者往尸陀林中用毒藥及鹽并血相和誦大明作護摩日三時滿七日至夜於護摩爐內現一女鬼相貌端正光明照耀立行者前行者即備白食出生及閼伽等時女鬼言我甚飢行者即報言我已為汝辦訖即出生食及閼伽等與之云此依佛敕汝受隨意女鬼得食已告行者言汝所求事我悉令汝皆得成就女鬼言訖即隱身不現復次説禁縛法用雌黃作冤家形像以尸灰遍塗像身及塗金剛杵行人以左足踏金剛杵右足踏彼像誦大明須臾冤家及眷屬失心狂亂去離本處復次説發遣冤家法行者先持誦大明一百遍然後觀想根本微妙字化成駱駝復觀前字乘彼駱駝又想一人以骨桗打彼冤家然想自身在風輪內面南坐誦普字發遣誦聲不輟直至冤家隱沒不現此觀想法亦可發遣金剛薩埵豈況冤家若用白芥子安息香相和加持一百遍作護摩者一切冤家速離本處復説成就法行者先於帛上或髑髏上畫金剛香菩薩身赤色於足不畫冤家像踏之行者作忿怒相誦大明不輟復以棘柴白芥子鹽用作護摩冤家速得失心狂亂又法於青帛上用人血調青畫冤家形像行者於八日或七日至中夜時出生食祭祀有來受此食者報行者言使我何作時行者即以冤家報之復以忿怒相稱冤家名誦大明作護摩至七日彼即破壞命終又法用𩕳摩木作冤家像段段截之別用𩕳摩木為柴與像身同作護摩誦大明一誦一燒彼冤家其身破壞復次於尸陀林中收取花鬘燒安息香誦大明八百遍加持彼鬘散於冤家舍彼并眷屬悉患三日瘧或將鬘埋於冤家門前彼冤家速趣命終或用燒安息香熏牛肉以此肉作護摩一誦大明一稱冤家名一擲火中至三夜彼冤家即患四日瘧若欲解除用乳汁作護摩即痊可如故又法用尸灰塗曼拏羅又用尸灰作冤家像安曼拏羅中用紅色花打彼像一誦一擲至三日擲像於火中其冤家身即破壞
