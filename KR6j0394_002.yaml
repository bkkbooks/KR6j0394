body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯復次作禁伏法先畫金剛香菩薩作圓滿相身黃色放大光明照虛空界住大山頂足踏冤家像行者於此像前作觀想得現前已一切冤家皆悉禁縛又法於幀上同前畫金剛香菩薩以上妙香花而作供養用雌黃及淨土與水和埿作冤家像行者於菩薩幀前手執五股金剛杵作忿怒相起踏冤家誦大明一千遍一切冤家皆悉禁伏又法用黃臘作冤家像行者以左足踏復作觀想彼冤家在百千由旬內復觀聖賢遍滿虛空得此觀現前已彼冤自然如癡不能為害此成就法若向諸佛作者諸佛亦不欲違何況一切聖賢及人非人等即説降伏大明曰唵引一句曩謨婆誐嚩帝引二摩賀引嚩日囉二合巘引馱引哩摩賀引末攞三塞儞也二合娑擔二合婆儞引四攞攞攞攞娑擔二合婆野薩哩嚩二合設咄𭍌二合五曩引舍薩野六娑普二合引吒野七尾捺囉二合引鉢野八薩哩嚩二合曩引舍野九薩哩嚩二合訥瑟吒二合引儞伽引怛野十摩摩薩哩嚩二合迦引哩也二合抳十一矩嚕十二矩嚕十三虎盧十四虎盧十五祖盧十六祖盧十七母盧十八母盧十九達摩二十達摩二十一囕誐二十二囕誐二十三尾捺囉二合引鉢野二十四尾捺囉二合引鉢野二十五薩哩嚩二合迦引哩也二合引抳彌引二十六禰哩二合引茶矩嚕二十七薩哩嚩二合悉地孕二合彌引二十八鉢囉二合野蹉二十九伊呬曳二合引呬婆誐嚩帝引三十摩賀引嚩日囉二合巘引馱引哩引三十一郝入郝郝郝吽引發吒半音娑嚩二合引賀引三十二由誦此明能成就一切事能破一切冤家復説成就法於月一日或初七日初八日行者食赤色食著潔淨衣誦大明千遍或百遍若得身毛喜竪或於夜分得見種種吉夢已此後當依金剛香菩薩作法一切皆得成就欲令婆羅門敬愛者用生酥作婆羅門像然誦大明八百遍加持白芥子稱婆羅門名以白芥子打像彼則敬愛又法用鹽加持八百遍當稱毗舍名每一稱名一誦大明用鹽一打彼像彼毗舍則敬愛又法用黑豆誦大明加持八百遍用炭灰作首陀像然後一誦大明一稱彼名以豆一擲彼像滿八百遍彼自來敬愛復次説金剛香菩薩成就根本大明印以二手各作金剛拳二小指相交二頭指相交如鉤二拇指展舒成印此印有大威力能成就一切最上事能破一切冤家一切天人乃至宿曜見此印已驚怖欲死唯稱念佛以求覆護即説根本大明曰唵引曩謨婆誐嚩帝引一句摩賀引嚩日囉二合巘引馱引哩引二入嚩二合攞三入嚩二合攞四阿引迦哩沙二合野五阿引迦哩沙二合野引六娑擔二合婆野七娑擔二合婆野八悉馱路左𩕳引九吽引發吒半音十復説句召印不解前印以二頭指如鉤動搖成印此印能句召一切天龍藥叉囉叉娑及一切鬼神并宿曜等皆來可為僮僕乃至或有諸菩薩聞此大明句召之者於剎那之間即至即説句召大明曰唵引曩謨婆誐嚩帝引一句摩賀引嚩日囉二合巘引馱引哩引二伊呬曳引二合呬阿引誐蹉二合三阿引誐蹉四摩摩三摩野五摩耨播引攞野六悉馱室贊二合拏嚩日囉二合播引抳引七囉引倪鉢野底八紇哩二合引九郝郝郝郝郝十攞攞攞攞斛十一若有行人為作種種饒益之事作曼拏羅已欲請本尊金剛香菩薩者當誦此明結印句召菩薩行人復於曼拏羅前瞑目作觀想菩薩於剎那頃菩薩即來菩薩來時現忿怒相而有六面利牙外出種種嚴身光焰熾盛如日初出而有百臂手中各各執於器仗欲破一切冤家之相行人審知菩薩來已即想奉上衆寶蓮華之座菩薩坐已觀知行人具真實意即時為説諸佛微妙三昧行人聞已歡喜禮謝復次説三昧印以二手作金剛合掌舒二拇指二小指相交二頭指如環成印若結此印三昧現前復説沐浴印以二手合掌屈二頭指以二拇指捻二頭指甲如環成印每沐浴諸佛賢聖結此印即誦明曰唵引曩謨引婆誐嚩帝引一蘇嚕二蘇嚕三捺囉二合嚩四捺囉二合嚩五娑嚩二合賀引六復説獻香印二手合掌屈二頭指如月竪二拇指成印每獻香時結此印即誦明曰唵引曩謨引婆誐嚩帝引一摩賀引嚩日囉二合巘引馱引哩引二娑囉三娑囉四尾娑囉五尾娑囉六尾捺踰二合引多野七尾捺踰二合引多野八娑摩引迦引舍嚩底娑嚩二合引賀引九復説獻花印以二手合掌舒二拇指倒舒二無名指如針成印每獻花時結此印復誦明曰曩謨引婆誐嚩帝引一摩賀引嚩日囉二合巘引馱引哩引二虎盧三虎盧四祖盧五祖盧六母盧七母盧八補瑟波二合嚩底娑嚩二合引賀引復説獻燈印以二手並作拳竪二拇指成印每獻燈時結此印誦此明曰唵曩謨引婆誐嚩帝引摩賀引嚩日囉二合巘引馱引哩引入嚩二合羅入嚩二合羅唧致唧致娑嚩二合賀引復説塗香印以二手作堅固合掌二頭指二中指中節相交以二拇指按二頭指節成印每獻塗香結此印復誦明曰唵引曩謨引婆誐嚩帝引一三滿多巘馱娑嚩二合賀引二復説出生印以二手作金剛縛二中指竪如針屈二頭指以二拇指相按二頭指附中指成印每出生時結此印復誦明曰唵引曩謨引婆誐嚩帝引一摩賀引嚩日囉二合巘馱引哩引二娑囉三娑囉四尾娑囉五尾娑囉六佉引捺七佉引捺八婆入乞叉引二合鉢野九婆入乞叉引二合鉢野十嘮捺囉二合引十一嘮捺囉二合引十二曩入曩入娑嚩二合引賀引復説大金剛香菩薩成就大明曰唵引曩謨引婆誐嚩帝引一摩賀引嚩日囉二合巘引馱引哩引二阿儞迦囉濕彌二合三設多薩賀娑囉二合四鉢囉二合入嚩隸多五禰去鉢多二合帝引惹引曳引六沃誐囉二合鼻摩七跋野引曩迦引曳引八鼻澀摩二合跋野引儞引迦引曳引九摩賀引踰藝濕嚩二合哩引曳引十沙吒目二合佉引曳