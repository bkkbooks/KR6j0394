body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯復次行人欲作最上曼拏羅轉法輪相者行人先須自運志誠之心回向無上菩提然後擇取勝地勝地者謂聖賢住處或聖賢古跡之地或古寺天祠或近有寶之處或河岸或池側是諸清淨之地得是地已發歡喜心即於阿闍梨起如佛想作禮供養請於建曼拏羅處誦明結界已然後可於此地作曼拏羅於曼拏羅中畫本尊金剛香菩薩作忿怒相或大笑相有四面面有三目目放大光光如劫火有十二臂以八大龍王及衆寶衣裝嚴其身光焰熾盛現大惡相或大笑相以二手頭指直竪安當心餘手執捉器仗謂金剛杵鉤槍劍弓箭寶瓶三叉髑髏羂索等如是畫降三界相於菩薩東邊畫摩醯濕嚩囉天南邊畫那羅延天西邊畫迦哩底枳野天北邊畫烏摩女天於內四隅畫大梵天吉祥天帝釋天及部多主於曼拏羅外四隅畫七母鬼及曩致濕嚩囕摩賀迦攞尾曩野迦等復畫部多及龍夜叉必舍左吠多拏塞建度烏摩捺阿鉢娑摩囉誐嚕拏等如是依法次第畫曼拏羅及菩薩已即行人自潔淨著赤色衣入曼拏羅請本尊及諸賢聖先結金剛香菩薩印及誦大明請菩薩降臨曼拏羅次句召曼拏羅內諸天及賢聖等各依次第結印誦大明句召想降臨已即奉獻閼伽及香花等已然後說所求事以求成就初得勝地結界大明曰唵引曩謨引婆誐嚩底一嚩日囉二合巘引馱引哩引二𠸪叉三𠸪叉四摩賀引𠸪叉五烏哩馱二合滿馱六遏唐滿馱七禰舍引滿馱八娑囉九娑囉十嚩日囉二合入嚩二合引攞引摩引里禰十一吽引發吒半音十二結界作曼拏羅畫像已行人初入曼拏羅誦此大明此明亦名句召明曩謨引囉怛曩二合怛囉二合夜引野摩賀引嚩日囉二合巘引馱引哩引一阿謨引伽伊係曳二合引呬二阿鉢囉二合底賀多伊呬三阿引誐蹉婆誐嚩底尸伽囕二合四阿引尾舍阿引尾舍五鉢囉二合尾舍鉢囉二合尾舍六吽引𠺁吽引發吒半音娑嚩二合賀引七誦此明已復誦根本大明曰唵引一紇哩二合引二吽引三誦此明已復誦根本心明曰唵引一吽引二阿引烏當切吽引三誦此明已復誦句召大明曰唵引曩謨引囉怛曩二合怛囉二合夜引野引一曩莫室贊二合拏嚩日囉二合播引拏曳引二摩賀引藥叉枲引曩引鉢多曳引三唵引阿謨伽俱舍引曳引四阿鉢囉二合底賀多舍引娑曩引曳引五紇哩二合引六羯囉七羯囉八羯茶九羯茶十吽𠺁吽發吒半音十一誦此明已想菩薩降臨曼拏羅已又想菩薩有種種字輪裝嚴其身初想唵勃哩二合吒􅁥娑嚩二合引賀在菩薩頂次想吽發吒字在菩薩頭次想唵娑普二合嚕􅁥娑嚩二合引賀引字在菩薩兩眼次想紇哩二合曩莫􅁥娑嚩二合引賀引字在菩薩心次想帝乞叉拏三合尾惹曳引郝字為菩薩種種種嚴身鎧甲次想唵引吽引發吒半音字為菩薩所執種種器仗次想唵引羯播引攞麼引哩儞吽引發吒半音為菩薩初忿怒相次想吽引發吒半音大明字為菩薩大忿怒相次想唵引鉢囉二合贊拏吠引誐馱引哩抳引紇哩引二合吽引郝此大明字為菩薩根本極忿怒相次想菩薩誦微妙大明曰唵引暗惹𭍌二合吽引次想菩薩誦能破壞一切大明曰唵引惹𭍌二合􅁯莎嚩二合如是作觀智得一一現前已行人身心歡喜以頭面作禮即捧閼伽獻菩薩獻閼伽明曰唵引薩哩嚩二合悉提引毗踰二合引曩莫娑嚩二合賀引燒香獻菩薩明曰唵引曩謨婆誐嚩底一度半仡哩二合恨拏二合二悉馱三摩曳引三吽引曩莫娑嚩二合賀四獻花明曰唵引室哩二合引攞剎彌二合引一鉢囉二合底仡哩二合恨拏二合𤚥切身二踰鉢儞擔三補澀波二合娑嚩二合賀引四獻燈明曰唵引入嚩二合攞娑嚩二合引賀引一獻塗香明曰唵引戍毗引一戍毗引二巘馱嚩引悉儞引三巘馱引哩四巘馱必哩二合曳引娑嚩二合賀引五獻食明曰唵引禰麼也二合末隸引囉引惹引野一禰引呬禰呬二娑嚩二合賀引三如是種種奉獻供養已次求菩薩施於歡喜誦明曰唵引曩謨嚩日囉二合巘引馱引哩一虎盧二虎盧三底瑟姹二合四底瑟姹二合五吽發吒半音六誦此明已想於菩薩得施歡喜然後行人隨意作法所求意願悉獲成就復說能調難調大忿怒印相頂印以二手平掌二中指如鉢二無名指安中指第三節二拇指屈入掌作拳成印結此印時即想大明字相在菩薩頂眼印不改前印舒二頭指成印結此印時想大明字相在菩薩兩眼鎧甲印以二手作拳想如鵝翅相成印結此印時想大明成鎧甲被本尊身而為裝嚴器仗印以右手作拳以拇指捏頭指甲成印結此印時想大明成諸器仗在本尊手此亦名心印亦名根本忿怒印決定金剛鉤印以二手作拳二小指相結二中指展舒相交右頭指屈如鉤成印金剛索印以無名指與頭指作執索勢成印金剛鈴印以右手作拳作搖動勢成印獻閼伽印以二手合掌如捧物勢成印獻花印以二手作合掌屈二中指入掌內成印獻香印不改前印相屈二中指頭成印獻塗香印以左手平掌展舒成印獻燈印以二手屈指展舒二小指成印獻花鬘印以二手仰掌如嫩蓮花成印破壞一切魔障印以二手當心各作拳復以左手拇指捏小指甲展舒餘指成印根本忿怒印立身如舞勢以左手拇指捻小指作如軍持相安於心上右手竪立展指作如相口誦吽字成印此印能除大魔亦能句召能開修羅窟能驚怖諸龍能却他軍能斷他呪大忿怒印立身如舞勢以二手各作拳二臂相交竪左拳安心上右拳亦竪立作忿怒相口誦吽字成印此印作大降伏用能怖一切大魔及大夜叉囉叉等持數珠印以二手各以拇指與頭指相捻成印結此印時誦根本心明同用能令梵天或那羅延天或摩醯濕嚩囉天等出現或令入寤如是最上曼拏羅法及能調難調諸印相等阿闍梨所欲傳授者必須審察不許授與諸不忠不孝不敬三寶不修衆善及患諸惡疾者是等之人亦不許令聞何以故如是之人以惡業故若聞是法返生輕謗於當來世獲大苦報復說金剛香三昧大明成就法即說三昧大明曰曩謨囉怛曩二合怛囉二合夜引野一曩莫室贊二合拏嚩日囉二合播引拏曳引二摩賀引藥叉枲引曩引鉢多曳引三祖攞祖攞四誐蹉誐蹉五摩賀引末梨引娑嚩二合引賀引六布曩囉引誐摩曩引野七俱嚕俱嚕八誐蹉誐蹉娑嚩二合引賀引九摩賀引末梨娑嚩二合賀引十嚩曩阿引羯哩沙二合野十一阿引迦哩沙二合野十二仡哩二合恨拏二合仡哩二合恨拏二合十三尸伽囕二合阿引尾舍十四阿引尾舍娑嚩二合引賀引十五摩摩嚩攞禰引鑁十六阿引誐蹉阿引誐蹉十七母訥誐二合哩引拏十八多引拏野十九沒囉二合憾摩二合引𧹞二十阿引吠引舍二十一阿引吠引舍二十二惡乞叉二合蘇底哩二合拏二十三扇引底俱嚕二十四摩係引濕嚩二合囕二十五底哩二合戍梨引曩二十六紇哩二合那焰尾那引囉野二十七阿耨囉引倪引拏二十八薩哩嚩二合薩怛鑁二合嚩尸俱嚕二十九迦引攞俱吒尾試引拏三十謨賀野三十一謨賀野三十二麼引囉野三十三麼引囉野三十四俱麼引哩引𧹞覩三十五囉引誐野三十六囉引誐野三十七印捺哩二合引拏三十八達努嚩訥尾二合引波野三十九贊捺哩二合引拏羯盧沙四十枳攞尾二合沙四十一曩引舍野曩引舍野四十二阿引禰帝曳二合引曩四十三薩哩嚩二合嚕去聲呼昂引鉢囉二合賀引曩野四十四鉢囉二合賀引曩野藥乞叱二合引拏四十五薩哩嚩二合必㘑二合引多引曩引四十六摩哩那二合野四十七摩哩那二合四十八囉引陵覺切剎枲引曩四十九薩哩嚩二合捺囉二合麼也二合引拏五十跋乞叉二合野五十一跋乞叉二合野五十二必舍引左引喃引五十三捺呬也二合摩引曩五十四薩哩嚩二合烏底瑟姹二合五十五仡哩二合恨拏二合仡哩二合恨拏二合五十六必嚩必嚩五十七恭畔引拏女江切五十八薩哩嚩二合訖隸二合引舍引鉢馱引曩引野五十九阿屹儞二合薩哩嚩二合引虎鼎六十薩哩囉二合部多六十一薩哩嚩二合率嚕二合鼎六十二曩引舍野六十三曩引舍野六十四野莽薩哩嚩二合摩囉婆嚩曩六十五阿蜜哩二合旦馱引囉野六十六馱引囉野六十七嚩引踊薩哩嚩二合帝引惹仁顙切六十八馱引囉野六十九馱引囉野七十俱吠引囕薩哩嚩二合囉引昂覩引沙野七十一覩引沙野七十二達曩能薩哩嚩二合嚩哩釤二合引七十三薩哩嚩二合囉怛曩二合引嚩哩沙二合野七十四嚩哩沙二合野七十五特哩二合多羅引瑟吒囕三合七十六捺瑟吒囉三合羯囉引隸引曩七十七薩哩嚩二合訥瑟吒二合七十八跋乞叉二合野七十九跋乞叉二合野八十尾嚕播引乞叉八十一儞嚕波地尸引試引拏八十二覩引沙野八十三覩引沙野八十四摩賀引隸引曩八十五薩哩嚩二合入嚩二合哩引拏八十六仡哩二合恨拏二合仡哩二合恨拏二合八十七難禰計引濕嚩二合囉八十八薩哩嚩二合佉去葛切拏誐二合娑擔二合婆野八十九尾曩引野計引曩九十薩哩嚩二合尾覲曩引二合尾曩引舍野九十一尾曩引舍野九十二半體劍薩哩嚩二合鉢賀引囉九十三室躁二合引囉引𧹞九十四摩哩那二合野九十五摩哩那二合野九十六那引摩劍薩哩嚩二合設咄𭍌二合九十七曩引舍野九十八曩引舍野九十九路引賀劍一百薩哩嚩二合捺囉二合引嚩野一百一捺囉二合引嚩野一百二沙瑟致二合禰引尾引阿引羯哩沙二合野一百三阿引羯哩沙二合野一百四唵引迦引哩一百五薩哩嚩二合誐旦佐引攞野一百六佐引攞野一百七俱引致擬哩一百八迦引摩畔惹仁左切野一百九畔惹上同野一百一十訥哩誐二合迦引怛也二合引以儞一百一十一摩呬寅二合捺囕二合跋乞叉二合野一百一十二跋乞叉二合野一百一十三贊拏迦引怛也二合引以儞一百一十四莎婆嚩曩一百一十五阿引曩野一百一十六阿引曩野一百一十七迦引陵一百一十八摩賀引迦攞跢引拏野一百一十九跢引拏野一百二十摩賀引迦引陵一百二十一摩賀引曩引昂引覩引沙野一百二十二覩引沙野一百二十三嚩日囉二合迦引陵一百二十四嚩引喻吠引詣引曩一百二十五阿引吠引舍野一百二十六阿引吠引舍野一百二十七拽舍戍儞一百二十八訥哩婆二合誐引跢引拏野一百二十九跢引拏野一百三十蘇迦引陵一百三十一訥哩苾二合乞創二合嚩哩沙二合馱引覽引捫左一百三十二捫左一百三十三蘇迦引陵一百三十四薩哩嚩二合薩埵引哩他二合一百三十五蘇佉鉢囉二合那引鉢野一百三十六鉢囉二合那引鉢野一百三十七跋捺囉二合迦引陵一百三十八薩哩嚩二合覩引一百三十九跋捺囉二合引摩引曩野一百四十摩引曩野一百四十一祖引攞迦引陵一百四十二薩哩嚩二合尾覲曩二合引一百四十三祖引蘭拏二合野一百四十四祖蘭拏二合野一百四十五阿引屹儞二合引樣引一百四十六薩哩嚩二合薩埵引哩他二合阿訶邏二合捺曩一百四十七羯哩引曳引娑嚩二合引賀引一百四十八舍引梨劍引一百四十九薩哩嚩二合達曩一百五十馱引儞也二合嚩哩達二合儞引曳引娑嚩二合引賀引一百五十一扇引底劍引一百五十二薩哩嚩二合囉引誐訥吠二合沙一百五十三謨引賀砌引那曩一百五十四羯哩引曳引娑嚩二合賀引一百五十五設訖底一百五十六薩哩嚩二合欲馱引曩舍野娑嚩二合引賀引一百五十七設跢引稱一百五十八薩哩嚩二合怛囕二合引一百五十九薩哩嚩二